name: PR Pipeline

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize]

# Day 49 - Least privilege permissions
permissions:
  contents: read
  pull-requests: write

jobs:

  # Reusable Build & Test
  build-test:
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      node_version: "18"
      run_tests: true

  # NEW — Dependency Vulnerability Scan
  dependency-scan:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check Dependencies for Vulnerabilities
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: critical

  # PR Comment (only if security passes)
  pr-comment:
    runs-on: ubuntu-latest
    needs: dependency-scan

    steps:
      - name: PR Summary
        run: echo "PR checks passed for branch ${{ github.head_ref }}"